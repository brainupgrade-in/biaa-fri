apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: financial-agent
type: Opaque
stringData:
  database-url: "postgresql://agent_user:changeme@postgres:5432/financial_agent"
  llm-api-key: "your-groq-api-key-here"
  chroma-host: "chroma"
  chroma-port: "8000"
  environment: "production"
  log-level: "INFO"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: financial-agent
type: Opaque
stringData:
  postgres-user: "agent_user"
  postgres-password: "changeme"
  postgres-db: "financial_agent"
---
apiVersion: v1
kind: Secret
metadata:
  name: chroma-secrets
  namespace: financial-agent
type: Opaque
stringData:
  chroma-auth: "false"