apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: financial-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-role
  namespace: financial-agent
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-rolebinding
  namespace: financial-agent
subjects:
  - kind: ServiceAccount
    name: backend-sa
    namespace: financial-agent
roleRef:
  kind: Role
  name: backend-role
  apiGroup: rbac.authorization.k8s.io