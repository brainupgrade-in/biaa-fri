apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: financial-agent
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: financial-agent
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: chroma
  namespace: financial-agent
spec:
  selector:
    app: chroma
  ports:
    - port: 8000
      targetPort: 8000
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: sandbox
  namespace: financial-agent
spec:
  selector:
    app: sandbox
  ports:
    - port: 8080
      targetPort: 8080
      name: http